[default]
cross_correlated_rvs_flag = false  # determines whether we use Morningstar stats as is (false) or if we create cross-correlated RoR
run_cnt = 1000
nb_cpu = 4
seed = 42
max_iter = 4

[RunMontecarloSimulation]
multi_cpu_threshold = 100  # Use multiple cpus if the run_cnt is above (>=) this threshold
delta_assets_multiplier = 0.025 # +/- 5%
target_confidence_level = 80  # 80%
confidence_level_tolerance = 2.0  # +/- 2%


[ConfigurationManager]
PLT_STYLE = 'seaborn-v0_8-deep'

[ArrayRandGen]
# See ReadMe - historically, S&P 500 has a floor of -47% and a ceiling of 53% - we will use a max of +/- 40% for RoR
RoR_floor = 0.60  # corresponds to a -40% RoR
Ror_ceiling = 1.40  # corresponds to a +40% RoR
clip_flag = true


[MontecarloSimulation]
run_cnt = 10_000
target_end_funds = 5e5
target_success_rate = 80
seed = 42
re_alloc_error = 1e-6 
nb_cpu = 1
Funds_step = 1e5
Discreet_step = 0.01
Success_threshold = 1.0
mgt_fee =  7e-3
rebalance_flag = true
cross_correlated_rvs_flag = true  # determines whether we use Morningstar stats as is (false) or if we create cross-correlated RoR
cashflow_file = "./life_plan_latest.xlsx"
Default_inflation_rate = 2.5e-2  # 2.5 %

[MontecarloSimulationDataLoader]
input_directory = './Data'
lifeplan_file_prefix = 'WFA_life_plan'
lifeplan_date_format = "%Y_%m_%d"
portfolio_file_prefix = 'portfolio_by_Asset_class'
portfolio_date_format = "%Y_%m_%d"
# capital_markets_file_prefix = 'Morningstar_asset_stats'
capital_markets_file_prefix = 'jpm_cpm_stats'
capital_markets_date_format = "%Y_%m_%d"


[MorningstarStats]
must_have_param = ['url_stats', 'url_corr', 'nb_smpl', 'model_file', 'xl_out_name']
XLabelLen = 5  # Length of the X axis labels
quick_flag = false
url_corr = "https://admainnew.morningstar.com/webhelp/Practice/Plans/Correlation_Matrix_of_the_14_Asset_Classes.htm"
url_stats = "https://admainnew.morningstar.com/webhelp/dialog_boxes/cs_db_editassumptions.htm"
nb_smpl = 1000000
validate_cross_correlation_flag = true
validation_error_margin = 1e-2 
model_file = "./Data/Morningstar_Asset_Stats/Models.xlsx"
xl_out_name = "./Data/Morningstar_asset_stats"

